name: Verify

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install linting tools
        run: pip install ruff==0.15.9 pylint==4.0.5

      - name: Run Ruff
        run: ruff check . || true

      - name: Run Pylint
        run: pylint src/ --exit-zero --disable=import-error

  check-release-version:
    name: Check Release Version
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check version does not already exist on PyPI
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Checking version $VERSION for babyros"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/babyros/$VERSION/json)

          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already exists on PyPI!"
            exit 1
          fi

          echo "Version $VERSION is available."
